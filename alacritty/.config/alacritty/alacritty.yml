window:
  opacity: 0.97
scrolling:
  history: 10000
  multiplier: 3
font:
  normal:
    family: SFMono Nerd Font
    style: Semibold
  bold:
    family: SF Mono
    style: Bold
  italic:
    family: SF Mono
    style: Regular Italic
  size: 7
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0
  use_thin_strokes: true
debug:
  render_timer: false
normal:
  black: "0x1e2127"
  red: "0xe06c75"
  green: "0x98c379"
  yellow: "0xd19a66"
  blue: "0x61afef"
  magenta: "0xc678dd"
  cyan: "0x56b6c2"
  white: "0x828791"
bell:
  animation: EaseOutExpo
  duration: 1
mouse_bindings:
  - mouse: Middle
    action: PasteSelection
selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>"
  save_to_clipboard: true
cursor:
  style: Block
  unfocused_hollow: false
live_config_reload: true
key_bindings:
  - key: Paste
    action: Paste
  - key: Copy
    action: Copy
  - key: L
    mods: Control
    action: ClearLogNotice
  - key: L
    mods: Control
    mode: ~Vi|~Search
    chars: "\f"
  - key: PageUp
    mods: Shift
    mode: ~Alt
    action: ScrollPageUp
  - key: PageDown
    mods: Shift
    mode: ~Alt
    action: ScrollPageDown
  - key: Home
    mods: Shift
    mode: ~Alt
    action: ScrollToTop
  - key: End
    mods: Shift
    mode: ~Alt
    action: ScrollToBottom

